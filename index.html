<!DOCTYPE html>
<html lang="is">
<head>
  <meta charset="UTF-8">
  <title>Verkefnalisti</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 800px;
      margin: auto;
      background: #f4f6f8;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .progress-container {
      background: #ddd;
      border-radius: 20px;
      overflow: hidden;
      margin-bottom: 20px;
    }

    .progress-bar {
      height: 20px;
      background: #4caf50;
      width: 0%;
      text-align: center;
      color: white;
      font-size: 12px;
    }

    h2 {
      background: #e0e7ff;
      padding: 8px;
      border-radius: 8px;
    }

    label {
      display: block;
      margin: 5px 0;
      padding: 6px;
      border-radius: 5px;
      transition: 0.2s;
    }

    input[type="checkbox"] {
      margin-right: 10px;
    }

    .done {
      background: #d1fae5;
      text-decoration: line-through;
    }

    .box {
      background: white;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 15px;
    }

    button {
      display: block;
      margin: 20px auto;
      padding: 10px 20px;
      border: none;
      background: #ef4444;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>📋 Verkefnalisti</h1>

<div class="progress-container">
  <div class="progress-bar" id="progressBar">0%</div>
</div>
<div id="celebration" style="display:none; text-align:center; margin:20px; font-size:24px;">
   Mission completed, þú hefur lokið við öll þau verkefni sem þú áttir að skila! 👏
</div>
  
<div class="box">
<h2>Stærðfræði</h2>
<label><input type="checkbox" id="math1"> Einföldun III</label>
<label><input type="checkbox" id="math2"> Jöfnur I</label>
<label><input type="checkbox" id="math3"> Jöfnur II</label>
<label><input type="checkbox" id="math4"> Jöfnur III</label>
<label><input type="checkbox" id="math5"> Mælingar I</label>
<label><input type="checkbox" id="math6"> Mælingar II</label>
<label><input type="checkbox" id="math7"> Tími – hraði – vegalengd</label>
<label><input type="checkbox" id="math8"> Horn og gráður</label>
<label><input type="checkbox" id="math9"> Rúmfræðiverkefni – bók</label>
<label><input type="checkbox" id="math10"> Sparnaður</label>
</div>

<div class="box">
<h2>Íslenska</h2>
<label><input type="checkbox" id="isl1"> Kappræður</label>
<label><input type="checkbox" id="isl2"> Englar alheimsins</label>
<label><input type="checkbox" id="isl3"> Hugtakakort/ættartré Gísli Súrsson</label>
</div>

<div class="box">
<h2>Enska</h2>
<label><input type="checkbox" id="eng1"> The conman</label>
<label><input type="checkbox" id="eng2"> Stjörnukort</label>
<label><input type="checkbox" id="eng3"> Just drop in (skjáskot)</label>
<label><input type="checkbox" id="eng4"> Kynning um valið efni</label>
</div>

<div class="box">
<h2>Danska</h2>
<label><input type="checkbox" id="dan1"> Viðtal</label>
<label><input type="checkbox" id="dan2"> Hlustunaræfingar</label>
<label><input type="checkbox" id="dan3"> Alexander og Hanna</label>
<label><input type="checkbox" id="dan4"> Den Dejligste Boy</label>
<label><input type="checkbox" id="dan5"> Skab en historie</label>
</div>

<div class="box">
<h2>Náttúrufræði</h2>
<label><input type="checkbox" id="nat1"> Heimurinn/geimurinn kynning</label>
<label><input type="checkbox" id="nat2"> Viðnám - tilraun</label>
</div>

<div class="box">
<h2>Samfélagsfræði</h2>
<label><input type="checkbox" id="sam1"> Ef ég væri</label>
<label><input type="checkbox" id="sam2"> Stórveldi á fornöld</label>
</div>

<button onclick="resetAll()">🔄 Núllstilla</button>

<script>
  const checkboxes = document.querySelectorAll('input[type="checkbox"]');
  const progressBar = document.getElementById('progressBar');

  function updateProgress() {
    let checked = 0;

    checkboxes.forEach(box => {
      if (box.checked) checked++;

      // litur + strik
      if (box.checked) {
        box.parentElement.classList.add("done");
      } else {
        box.parentElement.classList.remove("done");
      }
    });

    const percent = Math.round((checked / checkboxes.length) * 100);
    progressBar.style.width = percent + "%";
    progressBar.textContent = percent + "% búið";

    const celebration = document.getElementById("celebration");

if (percent === 100) {
  celebration.style.display = "block";
} else {
  celebration.style.display = "none";
}

} 

    

  // Hlaða vistuðum gildum
  checkboxes.forEach(box => {
    const saved = localStorage.getItem(box.id);
    if (saved === "true") {
      box.checked = true;
    }

    box.addEventListener('change', () => {
      localStorage.setItem(box.id, box.checked);
      updateProgress();
    });
  });

  function resetAll() {
    if (confirm("Ertu viss um að þú viljir núllstilla allt?")) {
      checkboxes.forEach(box => {
        box.checked = false;
        localStorage.removeItem(box.id);
      });
      updateProgress();
    }
  }

  updateProgress();
</script>

</body>
</html>
